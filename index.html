<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Navegação Guiada</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        #ar-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        a-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            display: none;
        }

        a-scene.active {
            display: block;
        }

        #status-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00E5FF;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            z-index: 100;
            font-family: 'Courier New', monospace;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #00FF00;
        }

        .status-dot.error {
            background-color: #FF0000;
        }

        #instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
            display: none;
        }

        #instruction.active {
            display: block;
        }

        .instruction-text {
            background: rgba(0, 20, 60, 0.95);
            border: 2px solid #00E5FF;
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            max-width: 80vw;
        }

        #map-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: #111;
            z-index: 10;
            border-top: 2px solid #00E5FF;
            overflow: hidden;
            display: flex;
        }

        #map {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #00E5FF;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        button:hover {
            background: #00D4FF;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        /* ===== RESPONSIVIDADE MOBILE ===== */
        
        @media (max-width: 768px) {
            #status-panel {
                font-size: 12px;
                padding: 10px 12px;
                top: 10px;
                left: 10px;
                border-radius: 6px;
            }

            .status-item {
                margin: 4px 0;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                margin-right: 6px;
            }

            .instruction-text {
                font-size: 16px;
                padding: 14px 20px;
                border-radius: 10px;
                max-width: 85vw;
            }

            #map-container {
                height: 35%;
            }

            a-scene {
                height: 65%;
            }

            #controls {
                bottom: 15px;
                right: 10px;
                gap: 8px;
            }

            button {
                padding: 10px 18px;
                font-size: 14px;
                border-radius: 6px;
                min-height: 44px;
            }
        }

        @media (max-width: 480px) {
            #status-panel {
                font-size: 11px;
                padding: 8px 10px;
                top: 8px;
                left: 8px;
            }

            .status-dot {
                width: 7px;
                height: 7px;
                margin-right: 5px;
            }

            .instruction-text {
                font-size: 14px;
                padding: 12px 16px;
                max-width: 90vw;
            }

            #controls {
                bottom: 10px;
                right: 8px;
                gap: 6px;
            }

            button {
                padding: 8px 14px;
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            #status-panel {
                font-size: 10px;
                padding: 6px 8px;
            }

            .instruction-text {
                font-size: 12px;
                padding: 10px 14px;
            }

            button {
                padding: 6px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div id="ar-container">
        <!-- AR Scene -->
        <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
            <a-camera id="camera" gps-camera rotation-reader></a-camera>
            <!-- SETA REMOVIDA - SERÁ CRIADA VIA JAVASCRIPT -->
        </a-scene>

        <!-- Status Panel -->
        <div id="status-panel">
            <div class="status-item">
                <div class="status-dot"></div>
                <span>📍 GPS: OK</span>
            </div>
            <div class="status-item">
                <div class="status-dot"></div>
                <span>🧭 Bussola: OK</span>
            </div>
        </div>

        <!-- Instruction -->
        <div id="instruction">
            <div class="instruction-text">
                ⬆️ Vire um pouco a direita
            </div>
        </div>

        <!-- Map Container -->
        <div id="map-container">
            <iframe 
                id="map" 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3935.4453753449963!2d-37.07000032346808!3d-10.914534889024628!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x71e1587981151d5%3A0x4a501367f076adff!2sAracaju%2C%20SE!5e0!3m2!1spt-BR!2sbr!4v1713516000000" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="toggle-ar-btn">▶️ Iniciar AR</button>
            <button id="toggle-instruction-btn">💬 Instrução</button>
        </div>
    </div>

    <script>
        const arScene = document.getElementById('ar-scene');
        const camera = document.getElementById('camera');
        const toggleARBtn = document.getElementById('toggle-ar-btn');
        const instructionDiv = document.getElementById('instruction');
        const toggleInstructionBtn = document.getElementById('toggle-instruction-btn');
        
        let arActive = false;
        let instructionActive = false;
        let arrow = null;

        // Criar seta como filha da câmera
        function createArrow() {
            console.log('🎯 Criando seta como filha da câmera...');
            
            // Container da seta
            arrow = document.createElement('a-entity');
            arrow.setAttribute('position', '0 0 -3');
            arrow.setAttribute('id', 'arrow-guide');

            // Cone (Ponta da Seta)
            const cone = document.createElement('a-cone');
            cone.setAttribute('radius-bottom', '0.4');
            cone.setAttribute('radius-top', '0');
            cone.setAttribute('height', '0.8');
            cone.setAttribute('position', '0 0.5 0');
            cone.setAttribute('color', '#00E5FF');
            cone.setAttribute('material', 'emissive: #00E5FF; emissiveIntensity: 0.8;');

            // Cylinder (Haste)
            const cylinder = document.createElement('a-cylinder');
            cylinder.setAttribute('radius', '0.15');
            cylinder.setAttribute('height', '1.5');
            cylinder.setAttribute('position', '0 -0.25 0');
            cylinder.setAttribute('color', '#00E5FF');
            cylinder.setAttribute('material', 'emissive: #00E5FF; emissiveIntensity: 0.6;');

            // Animação de rotação
            const animation = document.createElement('a-animation');
            animation.setAttribute('attribute', 'rotation');
            animation.setAttribute('from', '0 0 0');
            animation.setAttribute('to', '0 360 0');
            animation.setAttribute('dur', '4000');
            animation.setAttribute('repeat', 'indefinite');

            // Adicionar ao container
            arrow.appendChild(cone);
            arrow.appendChild(cylinder);
            arrow.appendChild(animation);

            // Adicionar como FILHA da câmera (NÃO da scene)
            camera.appendChild(arrow);
            
            console.log('✅ Seta adicionada à câmera');
        }

        // Remover seta
        function removeArrow() {
            if (arrow && arrow.parentNode) {
                camera.removeChild(arrow);
                arrow = null;
                console.log('🗑️ Seta removida');
            }
        }

        // Toggle AR
        toggleARBtn.addEventListener('click', () => {
            arActive = !arActive;
            
            if (arActive) {
                console.log('▶️ AR Iniciado');
                arScene.classList.add('active');
                toggleARBtn.textContent = '⏹️ Parar AR';
                instructionDiv.classList.add('active');
                createArrow(); // Criar seta quando AR é iniciado
            } else {
                console.log('⏹️ AR Parado');
                arScene.classList.remove('active');
                toggleARBtn.textContent = '▶️ Iniciar AR';
                instructionDiv.classList.remove('active');
                removeArrow(); // Remover seta quando AR é parado
            }
        });

        // Toggle Instruction
        toggleInstructionBtn.addEventListener('click', () => {
            if (arActive) {
                instructionActive = !instructionActive;
                instructionDiv.classList.toggle('active');
            }
        });

        // Log
        console.log('✅ AR Navigation App Loaded');
        console.log('🎯 Clique em "Iniciar AR" para começar');
    </script>
</body>
</html>
