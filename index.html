<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps Tour AR - Aracaju, Sergipe</title>
    <style>
        /* Estilos gerais */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        /* Tela inicial */
        #initial-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #initial-screen h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Container principal */
        #main-container {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* Câmera */
        #camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 1;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* AR Scene */
        #ar-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 2;
        }
        
        /* Mapa */
        #map {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 3;
        }
        
        /* Status Panel */
        #status-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 4;
            font-size: 0.8em;
        }
        
        /* Setas */
        #arrows {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            z-index: 5;
        }
        
        /* Botão sair */
        #exit-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 6;
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            #status-panel {
                font-size: 0.7em;
                top: 5px;
                right: 5px;
            }
            #arrows {
                font-size: 2em;
            }
        }
        
        @media (max-width: 480px) {
            #initial-screen h1 {
                font-size: 2em;
            }
            #start-btn {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!-- Tela Inicial -->
    <div id="initial-screen">
        <h1>Maps Tour AR - Aracaju</h1>
        <button id="start-btn">Iniciar</button>
    </div>
    
    <!-- Container Principal -->
    <div id="main-container">
        <!-- Câmera -->
        <div id="camera">
            <video id="video" autoplay muted></video>
            <canvas id="detection-canvas"></canvas>
        </div>
        
        <!-- AR Scene -->
        <div id="ar-scene"></div>
        
        <!-- Mapa -->
        <div id="map"></div>
        
        <!-- Status Panel -->
        <div id="status-panel">
            <div>Latitude: <span id="lat">--</span></div>
            <div>Longitude: <span id="lng">--</span></div>
            <div>Heading: <span id="heading">--</span>°</div>
            <div>Distância ao POI: <span id="distance">--</span> m</div>
            <div>Objetos Detectados: <span id="objects">0</span></div>
        </div>
        
        <!-- Setas -->
        <div id="arrows">↑</div>
        
        <!-- Botão Sair -->
        <button id="exit-btn">Sair</button>
    </div>
    
    <!-- Scripts -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY"></script>
    
    <script>
        // Variáveis globais
        let video = document.getElementById('video');
        let detectionCanvas = document.getElementById('detection-canvas');
        let ctx = detectionCanvas.getContext('2d');
        let model;
        let map;
        let userMarker;
        let poiMarkers = [];
        let pois = [
            { name: 'Praia de Atalaia', lat: -10.9472, lng: -37.0731 },
            { name: 'Museu de Sergipe', lat: -10.9117, lng: -37.0714 },
            { name: 'Centro Histórico', lat: -10.9160, lng: -37.0720 }
        ];
        let userPosition = { lat: -10.9472, lng: -37.0731 }; // Simulado inicialmente
        let heading = 0;
        let closestPoi = pois[0];
        
        // FASE 1: Câmera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                detectionCanvas.width = video.offsetWidth;
                detectionCanvas.height = video.offsetHeight;
            } catch (error) {
                console.error('Erro ao acessar câmera:', error);
            }
        }
        
        // FASE 4: Detecção de Objetos
        async function initDetection() {
            model = await cocoSsd.load();
            detectObjects();
        }
        
        async function detectObjects() {
            if (video.readyState === 4) {
                const predictions = await model.detect(video);
                ctx.clearRect(0, 0, detectionCanvas.width, detectionCanvas.height);
                predictions.forEach(prediction => {
                    const [x, y, width, height] = prediction.bbox;
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, width, height);
                    ctx.fillStyle = '#00FF00';
                    ctx.fillText(`${prediction.class} (${Math.round(prediction.score * 100)}%)`, x, y - 5);
                });
                document.getElementById('objects').textContent = predictions.length;
            }
            requestAnimationFrame(detectObjects);
        }
        
        // FASE 3: GPS
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, handleError, {
                    enableHighAccuracy: true,
                    maximumAge: 30000,
                    timeout: 27000
                });
            } else {
                // GPS simulado
                setInterval(() => {
                    userPosition.lat += (Math.random() - 0.5) * 0.001;
                    userPosition.lng += (Math.random() - 0.5) * 0.001;
                    updateMap();
                }, 5000);
            }
        }
        
        function updatePosition(position) {
            userPosition.lat = position.coords.latitude;
            userPosition.lng = position.coords.longitude;
            heading = position.coords.heading || 0;
            updateMap();
        }
        
        function handleError(error) {
            console.error('Erro GPS:', error);
            // Fallback para simulado
        }
        
        // Mapa
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: userPosition,
                zoom: 15,
                styles: [
                    { featureType: 'poi', stylers: [{ visibility: 'off' }] }
                ]
            });
            
            userMarker = new google.maps.Marker({
                position: userPosition,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: '#4285F4',
                    fillOpacity: 1,
                    strokeColor: '#fff',
                    strokeWeight: 2
                }
            });
            
            pois.forEach(poi => {
                const marker = new google.maps.Marker({
                    position: poi,
                    map: map,
                    title: poi.name
                });
                poiMarkers.push(marker);
            });
            
            updateMap();
        }
        
        function updateMap() {
            userMarker.setPosition(userPosition);
            map.setCenter(userPosition);
            
            // Calcular POI mais próximo
            let minDistance = Infinity;
            pois.forEach(poi => {
                const distance = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(userPosition.lat, userPosition.lng),
                    new google.maps.LatLng(poi.lat, poi.lng)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    closestPoi = poi;
                }
            });
            
            document.getElementById('lat').textContent = userPosition.lat.toFixed(6);
            document.getElementById('lng').textContent = userPosition.lng.toFixed(6);
            document.getElementById('heading').textContent = heading.toFixed(1);
            document.getElementById('distance').textContent = minDistance.toFixed(1);
            
            // Atualizar setas
            const bearing = google.maps.geometry.spherical.computeHeading(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(closestPoi.lat, closestPoi.lng)
            );
            const direction = Math.round((bearing - heading + 360) % 360 / 45);
            const arrows = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
            document.getElementById('arrows').textContent = arrows[direction];
        }
        
        // FASE 2: AR
        function initAR() {
            const scene = document.createElement('a-scene');
            scene.setAttribute('embedded', '');
            scene.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false;');
            
            pois.forEach((poi, index) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('gps-entity-place', `latitude: ${poi.lat}; longitude: ${poi.lng};`);
                entity.setAttribute('geometry', 'primitive: sphere; radius: 5');
                entity.setAttribute('material', 'color: cyan');
                entity.setAttribute('animation', 'property: scale; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate');
                scene.appendChild(entity);
                
                // Trilha (simplificada como linha)
                const line = document.createElement('a-entity');
                line.setAttribute('line', `start: 0 0 0; end: 0 10 0; color: cyan`);
                entity.appendChild(line);
            });
            
            document.getElementById('ar-scene').appendChild(scene);
        }
        
        // Inicialização
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            initCamera();
            initDetection();
            initGPS();
            initMap();
            initAR();
        });
        
        document.getElementById('exit-btn').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
