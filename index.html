<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    
    <title>🗺️ Maps Tour - AR Experience</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="responsive.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
</head>
<body>
    <!-- ============================================
         MENU INICIAL
         ============================================ -->
    <div id="mainMenu" class="menu-container">
        <h1>🗺️ Maps Tour</h1>
        <p>Explore pontos de interesse em Realidade Aumentada</p>
        
        <button id="startARBtn" class="btn btn-primary">
            📍 Iniciar AR
        </button>
        
        <button id="selectTourBtn" class="btn btn-secondary">
            📂 Escolher Tour
        </button>
    </div>

    <!-- ============================================
         AR CONTAINER
         ============================================ -->
    <div id="arContainer" class="ar-container" style="display: none;"></div>

    <!-- ============================================
         AR HUD (Interface)
         ============================================ -->
    <div id="arHUD" class="ar-hud" style="display: none;">
        <!-- Cabeçalho -->
        <div class="ar-header">
            <span id="tourName" class="tour-name">Tour: Carregando...</span>
            <button id="exitARBtn" class="btn-icon">✕</button>
        </div>

        <!-- Conteúdo Central -->
        <div class="ar-content">
            <div id="poiInfo" class="poi-card" style="display: none;">
                <h3 id="poiTitle"></h3>
                <p id="poiDesc"></p>
                <ul id="poiFacts"></ul>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="ar-footer">
            <div class="status-info">
                <span id="gpsStatus">📍 GPS: Inicializando...</span>
            </div>
            <div id="nearbyPOIs" class="nearby-pois"></div>
        </div>
    </div>

    <!-- ============================================
         MODAL: SELEÇÃO DE TOURS
         ============================================ -->
    <div id="tourModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Escolha um Tour</h2>
                <button id="closeTourModal" class="btn-icon">✕</button>
            </div>
            <div id="toursList" class="tours-list"></div>
        </div>
    </div>

    <!-- ============================================
         SCRIPTS EXTERNOS (ORDEM IMPORTANTÍSSIMA!)
         ============================================ -->
    
    <!-- Three.js (renderização 3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- AR.js (realidade aumentada) -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/three.js/ar.js"></script>

    <!-- ============================================
         SCRIPTS LOCAIS (SEU CÓDIGO)
         ============================================ -->
    
    <!-- Utilitários (deve vir primeiro) -->
    <script src="src/utils.js"></script>
    
    <!-- Geolocalização -->
    <script src="src/geoLocation.js"></script>
    
    <!-- AR Manager -->
    <script src="src/arjs-setup.js"></script>
    
    <!-- App Principal (deve vir por último) -->
    <script src="src/main.js"></script>
</body>
</html>
