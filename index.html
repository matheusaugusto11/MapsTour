<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR GPS Navigation with Computer Vision</title>
    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <!-- COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029077/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"></script>
    <!-- OpenCV.js for ORB -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()"></script>
    <!-- Google Maps API (replace YOUR_API_KEY with actual key) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&libraries=geometry"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #status-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
        #arrow-interface {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }
        #map-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            z-index: 1000;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }
        #a-scene {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60%;
        }
        #detection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            pointer-events: none;
            z-index: 999;
        }
        @media (max-width: 768px) {
            #status-panel {
                font-size: 12px;
            }
            #map-container {
                height: 50%;
            }
            #a-scene {
                height: 50%;
            }
        }
        @media (max-width: 480px) {
            #status-panel {
                font-size: 10px;
            }
            #map-container {
                height: 60%;
            }
            #a-scene {
                height: 40%;
            }
        }
    </style>
</head>
<body>
    <!-- Status Panel -->
    <div id="status-panel">
        <div>GPS: <span id="gps-status">Loading...</span></div>
        <div>Compass: <span id="compass">0°</span></div>
        <div>Coords: <span id="coords">0, 0</span></div>
        <div>Distance: <span id="distance">0 km</span></div>
    </div>
    <!-- Arrow Interface -->
    <div id="arrow-interface">
        <a-entity id="arrow" geometry="primitive: cone" material="color: cyan; opacity: 0.8" scale="0.5 1 0.5" position="0 0 -5" animation="property: scale; to: 0.6 1.2 0.6; dur: 1000; easing: easeInOutQuad; loop: true"></a-entity>
    </div>
    <!-- A-Scene -->
    <a-scene id="a-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera="simulateLatitude: 35.6895; simulateLongitude: 139.6917;" rotation-reader></a-camera>
        <!-- Navigation Overlay -->
        <a-entity id="nav-overlay" position="0 0 -10" text="value: Turn left in 100m; align: center; color: white; width: 6"></a-entity>
    </a-scene>
    <!-- Detection Canvas -->
    <canvas id="detection-canvas"></canvas>
    <!-- Map Container -->
    <div id="map-container"></div>
    <!-- Controls -->
    <div id="controls">
        <button onclick="startNavigation()">Start Nav</button>
        <button onclick="stopNavigation()">Stop Nav</button>
    </div>

    <script>
        let cocoSsdModel;
        let pose;
        let video;
        let canvas;
        let ctx;
        let map;
        let directionsService;
        let directionsRenderer;
        let currentPosition;
        let destination = { lat: 35.6895, lng: 139.6917 }; // Example destination
        let isNavigating = false;

        // Initialize
        async function init() {
            // Load COCO-SSD
            cocoSsdModel = await cocoSsd.load();

            // MediaPipe Pose
            pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
            });
            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onPoseResults);

            // Video and Canvas
            video = document.createElement('video');
            video.width = window.innerWidth;
            video.height = window.innerHeight * 0.6;
            canvas = document.getElementById('detection-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = video.width;
            canvas.height = video.height;

            // GPS
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, errorPosition, { enableHighAccuracy: true });
            }

            // Google Maps
            map = new google.maps.Map(document.getElementById('map-container'), {
                center: { lat: 35.6895, lng: 139.6917 },
                zoom: 15
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: true });

            // Start detection loop
            detectObjects();
        }

        function onOpenCvReady() {
            // ORB Feature Detection
            // Implement ORB here if needed
        }

        function updatePosition(position) {
            currentPosition = { lat: position.coords.latitude, lng: position.coords.longitude };
            document.getElementById('coords').textContent = `${currentPosition.lat.toFixed(4)}, ${currentPosition.lng.toFixed(4)}`;
            document.getElementById('gps-status').textContent = 'Active';
            // Visual Localization: Combine with vision
            // Plane Detection: Use AR.js or implement
        }

        function errorPosition(error) {
            document.getElementById('gps-status').textContent = 'Error';
        }

        async function detectObjects() {
            if (video.readyState >= 2) {
                const predictions = await cocoSsdModel.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                predictions.forEach(pred => {
                    if (['car', 'person', 'traffic light', 'building'].includes(pred.class)) {
                        ctx.strokeStyle = 'red';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(pred.bbox[0], pred.bbox[1], pred.bbox[2], pred.bbox[3]);
                        ctx.fillStyle = 'red';
                        ctx.fillText(pred.class, pred.bbox[0], pred.bbox[1] - 5);
                    }
                });
            }
            requestAnimationFrame(detectObjects);
        }

        function onPoseResults(results) {
            // Draw pose landmarks on canvas
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
                drawLandmarks(ctx, results.poseLandmarks, { color: '#FF0000', lineWidth: 2 });
            }
        }

        function startNavigation() {
            if (!currentPosition) return;
            isNavigating = true;
            directionsService.route({
                origin: currentPosition,
                destination: destination,
                travelMode: 'DRIVING'
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    updateNavigationOverlay(response);
                }
            });
        }

        function stopNavigation() {
            isNavigating = false;
            directionsRenderer.setMap(null);
        }

        function updateNavigationOverlay(response) {
            // Update arrow and text based on directions
            const steps = response.routes[0].legs[0].steps;
            if (steps.length > 0) {
                const nextStep = steps[0];
                document.getElementById('nav-overlay').setAttribute('text', 'value', nextStep.instructions);
                document.getElementById('distance').textContent = `${(nextStep.distance.value / 1000).toFixed(1)} km`;
            }
        }

        // Compass (simplified)
        window.addEventListener('deviceorientation', (event) => {
            document.getElementById('compass').textContent = `${Math.round(event.alpha)}°`;
        });

        // Start video
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
            video.play();
            const camera = new Camera(video, {
                onFrame: async () => {
                    await pose.send({ image: video });
                },
                width: video.width,
                height: video.height
            });
            camera.start();
        });

        window.onload = init;
    </script>
</body>
</html>
