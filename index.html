<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Hand Detection App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #00E5FF;
            overflow: hidden;
        }
        #status-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        .dot.gray { background-color: gray; }
        .dot.red { background-color: red; }
        .dot.green { background-color: green; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #map {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 300px;
            height: 200px;
            z-index: 1000;
        }
        #arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #00E5FF;
            z-index: 500;
        }
        button {
            background-color: #00E5FF;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="status-panel">
        <div class="status-item">
            <div class="dot" id="gps-dot"></div>
            <span>GPS</span>
        </div>
        <div class="status-item">
            <div class="dot" id="compass-dot"></div>
            <span>Compass</span>
        </div>
        <div class="status-item">
            <div class="dot" id="hand-dot"></div>
            <span>Hand Detection</span>
        </div>
    </div>
    <video id="video" autoplay muted></video>
    <div id="map"></div>
    <div id="arrow">↑</div>
    <button id="detect-btn">Start Hand Detection</button>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script>
        const video = document.getElementById('video');
        const detectBtn = document.getElementById('detect-btn');
        const gpsDot = document.getElementById('gps-dot');
        const compassDot = document.getElementById('compass-dot');
        const handDot = document.getElementById('hand-dot');
        const arrow = document.getElementById('arrow');

        let handDetectionActive = false;
        let hands;
        let map;
        let marker;

        // Initialize MediaPipe Hands
        function initHands() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
            });
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults(onResults);
        }

        // Handle hand detection results
        function onResults(results) {
            if (handDetectionActive) {
                if (results.multiHandLandmarks.length > 0) {
                    handDot.className = 'dot green';
                } else {
                    handDot.className = 'dot red';
                }
            }
        }

        // Start/stop hand detection
        detectBtn.addEventListener('click', () => {
            if (!handDetectionActive) {
                handDetectionActive = true;
                handDot.className = 'dot red';
                detectBtn.textContent = 'Stop Hand Detection';
                navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                    video.srcObject = stream;
                    video.play();
                    const camera = new Camera(video, {
                        onFrame: async () => {
                            if (handDetectionActive) {
                                await hands.send({ image: video });
                            }
                        },
                        width: 640,
                        height: 480
                    });
                    camera.start();
                });
            } else {
                handDetectionActive = false;
                handDot.className = 'dot gray';
                detectBtn.textContent = 'Start Hand Detection';
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            }
        });

        // GPS functionality
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(position => {
                    gpsDot.className = 'dot green';
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if (map && marker) {
                        marker.setLatLng([lat, lng]);
                        map.setView([lat, lng], 15);
                    }
                }, () => {
                    gpsDot.className = 'dot red';
                });
            } else {
                gpsDot.className = 'dot gray';
            }
        }

        // Compass functionality
        function initCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', event => {
                    compassDot.className = 'dot green';
                    const heading = event.alpha;
                    arrow.style.transform = `translate(-50%, -50%) rotate(${heading}deg)`;
                });
            } else {
                compassDot.className = 'dot gray';
            }
        }

        // Initialize map
        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }

        // Initialize everything
        initHands();
        initGPS();
        initCompass();
        initMap();
    </script>
</body>
</html>
