<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação AR Simplificada</title>
    <!-- Incluir A-Frame para AR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Incluir AR.js para AR baseada em localização -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- TensorFlow.js e COCO-SSD para detecção de objetos -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- Google Maps API (substitua YOUR_API_KEY pela sua chave) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&callback=initMap"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #camera { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ar-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        #map { position: fixed; bottom: 0; left: 0; width: 100%; height: 40%; z-index: 3; }
        #status-panel { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; z-index: 4; }
        #exit-btn { position: fixed; top: 10px; left: 10px; z-index: 5; }
        #initial-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .arrow { font-size: 50px; color: cyan; position: fixed; bottom: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 6; }
    </style>
</head>
<body>
    <!-- Tela inicial -->
    <div id="initial-screen">
        <div>
            <h1>Bem-vindo à Navegação AR</h1>
            <button onclick="startApp()">Iniciar</button>
        </div>
    </div>

    <!-- Câmera ao vivo -->
    <video id="camera" autoplay playsinline></video>

    <!-- Cena AR -->
    <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- Trilha cyan 3D apontando para destino -->
        <a-entity id="trail" geometry="primitive: cylinder; radius: 0.01; height: 10" material="color: cyan" position="0 0 -5" rotation="0 0 0"></a-entity>
        <!-- 3 POIs com marcadores -->
        <a-entity gps-entity-place="latitude: -23.5505; longitude: -46.6333" geometry="primitive: sphere; radius: 0.5" material="color: red"></a-entity>
        <a-entity gps-entity-place="latitude: -23.5510; longitude: -46.6340" geometry="primitive: sphere; radius: 0.5" material="color: green"></a-entity>
        <a-entity gps-entity-place="latitude: -23.5520; longitude: -46.6350" geometry="primitive: sphere; radius: 0.5" material="color: blue"></a-entity>
    </a-scene>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Painel de status -->
    <div id="status-panel">
        <div>GPS: <span id="gps">Simulado</span></div>
        <div>Bússola: <span id="compass">0°</span></div>
        <div>Distância: <span id="distance">0m</span></div>
        <div>Confiança: <span id="confidence">0%</span></div>
    </div>

    <!-- Setas dinâmicas -->
    <div id="arrows" class="arrow">↑</div>

    <!-- Botão sair -->
    <button id="exit-btn" onclick="exitApp()">Sair</button>

    <script>
        let video = document.getElementById('camera');
        let arScene = document.getElementById('ar-scene');
        let map;
        let cocoModel;
        let isSimulating = true; // Começar simulando GPS
        let userLat = -23.5500; // Simulado
        let userLng = -46.6320;
        let destinationLat = -23.5510;
        let destinationLng = -46.6340;

        // Iniciar câmera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error('Erro ao acessar câmera:', err);
            }
        }

        // Iniciar app
        function startApp() {
            document.getElementById('initial-screen').style.display = 'none';
            startCamera();
            initMap();
            loadCocoSSD();
            updateStatus();
            setInterval(updateArrows, 1000);
        }

        // Sair do app
        function exitApp() {
            location.reload();
        }

        // Inicializar mapa
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: userLat, lng: userLng },
                zoom: 15
            });
            // Trajeto azul
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({ map: map, polylineOptions: { strokeColor: 'blue' } });
            directionsService.route({
                origin: { lat: userLat, lng: userLng },
                destination: { lat: destinationLat, lng: destinationLng },
                travelMode: google.maps.TravelMode.WALKING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                }
            });
        }

        // Carregar COCO-SSD
        async function loadCocoSSD() {
            cocoModel = await cocoSSD.load();
            detectObjects();
        }

        // Detecção de objetos
        async function detectObjects() {
            if (video.readyState === 4) {
                const predictions = await cocoModel.detect(video);
                // Simplificado: apenas log
                console.log(predictions);
                // Atualizar confiança
                document.getElementById('confidence').textContent = predictions.length > 0 ? 'Alta' : 'Baixa';
            }
            requestAnimationFrame(detectObjects);
        }

        // Atualizar status
        function updateStatus() {
            document.getElementById('gps').textContent = `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
            // Simular bússola
            document.getElementById('compass').textContent = Math.floor(Math.random() * 360) + '°';
            // Calcular distância
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(userLat, userLng),
                new google.maps.LatLng(destinationLat, destinationLng)
            );
            document.getElementById('distance').textContent = Math.round(dist) + 'm';
        }

        // Atualizar setas
        function updateArrows() {
            // Simulação simples
            const arrows = ['↑', '←', '→', '↓'];
            document.getElementById('arrows').textContent = arrows[Math.floor(Math.random() * 4)];
        }

        // Para GPS real (descomente quando testar)
        /*
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition((position) => {
                userLat = position.coords.latitude;
                userLng = position.coords.longitude;
                updateStatus();
                // Atualizar mapa e AR
            });
        }
        */
    </script>
</body>
</html>
