<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maps Tour AR - Aracaju, Sergipe</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #initial-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #initial-screen h1 { font-size: 2.5em; margin-bottom: 20px; text-align: center; }
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }

        #main-container {
            display: none;
            position: fixed;
            inset: 0;
        }

        /* Camera: full-screen background */
        #camera-area {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: #111;
        }

        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #landmark-canvas,
        #hand-canvas,
        #nav-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* Nav HUD: teal circle + distance pill at top-center */
        #nav-hud {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 15;
            pointer-events: none;
        }
        #nav-arrow-circle {
            width: 72px; height: 72px;
            background: #00BFA5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,191,165,0.55);
        }
        #arrow-svg {
            width: 38px; height: 38px;
            display: block;
            transition: transform 0.35s ease;
        }
        #nav-pill {
            background: rgba(255,255,255,0.95);
            color: #222;
            font-size: 13px;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 14px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.22);
        }

        /* Bottom sheet: white rounded card with map + bottom-nav */
        #bottom-sheet {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 42%;
            background: #fff;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex: 1;
            width: 100%;
            min-height: 0;
        }
        #bottom-nav {
            display: flex;
            background: #fff;
            border-top: 1px solid rgba(0,0,0,0.08);
            height: 56px;
            flex-shrink: 0;
        }
        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 11px;
            color: #888;
            cursor: pointer;
            touch-action: manipulation;
            border: none;
            background: none;
        }
        .nav-tab.active { color: #00BFA5; }
        .nav-tab svg { width: 22px; height: 22px; }

        /* Exit button: top-right */
        #exit-btn {
            position: absolute;
            top: 8px; right: 8px;
            padding: 8px 14px;
            background: rgba(244,67,54,0.85);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            z-index: 20;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
        }

        /* GPS / Bussola pills: top-left */
        #status-bar {
            position: absolute;
            top: 8px; left: 8px;
            z-index: 20;
            display: flex; gap: 5px;
            pointer-events: none;
        }
        .status-pill {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            color: #999;
        }
        .status-pill.ok { color: #4BD4D2; }

        /* Hidden elements kept for JS compatibility */
        #status-panel, #arrows { display: none; }

        /* Street View: floats above bottom sheet */
        #sv-panel {
            position: absolute;
            bottom: calc(42% + 8px); right: 8px;
            z-index: 11;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.15);
        }
        #sv-toggle {
            width: 100%;
            padding: 7px 12px;
            background: rgba(25,55,130,0.95);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.78em;
            text-align: left;
            touch-action: manipulation;
        }
        #sv-view {
            width: 0; height: 0;
            transition: width 0.22s, height 0.22s;
        }
        #sv-panel.open #sv-view {
            width: 220px;
            height: 132px;
        }
        #sv-controls {
            display: none;
            padding: 5px 6px;
            gap: 5px;
            align-items: center;
        }
        #sv-panel.open #sv-controls { display: flex; }
        #sv-snap, #sv-calibrate {
            flex: 1;
            padding: 5px 0;
            font-size: 0.7em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            touch-action: manipulation;
            color: white;
        }
        #sv-snap      { background: #1976D2; }
        #sv-calibrate { background: #7B1FA2; }
        #sv-status {
            font-size: 0.65em;
            color: #aaa;
            min-width: 36px;
            text-align: right;
        }

        @media (max-width: 480px) {
            #initial-screen h1 { font-size: 1.8em; }
            #start-btn { font-size: 1em; }
            #sv-panel.open #sv-view { width: 170px; height: 102px; }
        }
    </style>
</head>
<body>

    <div id="initial-screen">
        <h1>Maps Tour AR<br>Aracaju</h1>
        <button id="start-btn">Iniciar</button>
    </div>

    <div id="main-container">
        <div id="camera-area">
            <video id="video" autoplay muted playsinline webkit-playsinline></video>
            <canvas id="landmark-canvas"></canvas>
            <canvas id="hand-canvas"></canvas>
            <canvas id="nav-canvas"></canvas>

            <!-- Nav HUD: teal arrow + distance/time pill -->
            <div id="nav-hud">
                <div id="nav-arrow-circle">
                    <svg id="arrow-svg" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 5 L30 32 L19 25 L8 32 Z" fill="white"/>
                    </svg>
                </div>
                <div id="nav-pill">-- m  -- min</div>
            </div>

            <!-- Street View panel -->
            <div id="sv-panel">
                <button id="sv-toggle">🗺 Street View</button>
                <div id="sv-view"></div>
                <div id="sv-controls">
                    <button id="sv-snap">📍 Snap GPS</button>
                    <button id="sv-calibrate">🧭 Calibrar</button>
                    <span id="sv-status"></span>
                </div>
            </div>
        </div>

        <!-- Bottom sheet with map and navigation bar -->
        <div id="bottom-sheet">
            <div id="map"></div>
            <nav id="bottom-nav">
                <button class="nav-tab active" id="tab-mapa">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                    Mapa
                </button>
                <button class="nav-tab" id="tab-qr">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm8 4h2v2h-2zm0-4h2v2h-2zm2 2h2v2h-2zm2-2h2v4h-4v-2h2zm0 4h2v2h-2z"/></svg>
                    QR Code
                </button>
                <button class="nav-tab" id="tab-libras">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 6c0-1.1-.9-2-2-2s-2 .9-2 2h2v1H9V6H7v1H5V6c0-1.1-.9-2-2-2v10c0 2.76 2.24 5 5 5h4c2.76 0 5-2.24 5-5V9h-4V6zm2 8c0 1.65-1.35 3-3 3H8c-1.65 0-3-1.35-3-3V8h2v1h2V8h2v1h2V8h2v6z"/></svg>
                    Libras
                </button>
            </nav>
        </div>

        <!-- Hidden elements kept for JS compatibility -->
        <div id="status-panel" style="display:none">
            <div>Lat: <span id="lat">--</span></div>
            <div>Lng: <span id="lng">--</span></div>
            <div>Heading: <span id="heading">--</span>°</div>
            <div>Dist. POI: <span id="distance">--</span> m</div>
            <div>Mão: <span id="hand-status">--</span></div>
        </div>
        <div id="arrows" style="display:none">↑</div>

        <button id="exit-btn">Sair</button>
        <div id="status-bar">
            <span class="status-pill" id="st-gps">GPS...</span>
            <span class="status-pill" id="st-bus">Bussola...</span>
        </div>
    </div>

    <!-- MediaPipe Hands (detecta apenas mãos, sem detectar pessoa) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- Three.js para o cubo 3D -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&libraries=geometry"></script>

    <script>
        const video          = document.getElementById('video');
        const landmarkCanvas = document.getElementById('landmark-canvas');
        const lmCtx          = landmarkCanvas.getContext('2d');
        const handCanvas     = document.getElementById('hand-canvas');

        let handsDetector;
        let threeRenderer, threeScene, threeOrthoCamera, handObject;
        let map, userMarker;
        let navCanvas, navCtx, navAnimPhase = 0;
        let svPanorama = null, svService = null, svOpen = false;
        let directionsService, directionsRenderer;
        let lastRoutePos = null, routeTimer = null;

        const pois = [
            { name: 'Praia de Atalaia', lat: -10.9472, lng: -37.0731 },
            { name: 'Museu de Sergipe',  lat: -10.9117, lng: -37.0714 },
            { name: 'Centro Histórico',  lat: -10.9160, lng: -37.0720 }
        ];
        let userPosition = { lat: -10.9472, lng: -37.0731 };
        let heading = 0;
        let headingOffset = 0; // correcao aplicada pela calibracao de Street View
        let bearing = 0;
        let closestPoi = pois[0];
        let compassActive = false;
        let routePath = null;            // overview_path da rota calculada
        let minDistToClosestPoi = Infinity; // atualizado em updateMap

        // heading efetivo = compass + correcao de calibracao
        function getHeading() { return (heading + headingOffset + 360) % 360; }

        // Filtro low-pass para angulos: evita saltos 359->1
        function suavizarAngulo(atual, novo, fator) {
            const d = ((novo - atual + 540) % 360) - 180;
            return (atual + d * fator + 360) % 360;
        }

        // Haversine sem depender do Maps SDK (usado antes do mapa carregar)
        function calcDistanciaSimples(a, b) {
            const R = 6371000, D2R = Math.PI / 180;
            const dLat = (b.lat - a.lat) * D2R;
            const dLon = (b.lng - a.lng) * D2R;
            const aa = Math.sin(dLat / 2) ** 2
                     + Math.cos(a.lat * D2R) * Math.cos(b.lat * D2R) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
        }

        // ── Câmera ────────────────────────────────────────────────
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: 'environment' },
                        width:  { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                video.addEventListener('loadedmetadata', syncCanvasSize);
                window.addEventListener('resize', syncCanvasSize);
            } catch (err) {
                alert('Câmera indisponível: ' + err.message);
            }
        }

        function syncCanvasSize() {
            const vw = video.videoWidth  || 640;
            const vh = video.videoHeight || 480;
            landmarkCanvas.width  = vw;
            landmarkCanvas.height = vh;
        }

        function syncNavCanvas() {
            const area = document.getElementById('camera-area');
            navCanvas.width  = area.clientWidth;
            navCanvas.height = area.clientHeight;
        }

        // ── MediaPipe Hands ───────────────────────────────────────
        // Detecta somente mãos (21 pontos) — não identifica pessoa
        async function initHandTracking() {
            document.getElementById('hand-status').textContent = 'Carregando...';

            handsDetector = new Hands({
                locateFile: file =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            handsDetector.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.75,
                minTrackingConfidence:  0.6
            });

            handsDetector.onResults(onHandResults);

            // aguarda o vídeo estar pronto antes de começar
            await new Promise(res => {
                if (video.readyState >= 1) { res(); return; }
                video.addEventListener('loadedmetadata', res, { once: true });
            });

            document.getElementById('hand-status').textContent = 'Pronto';
            processHandFrame();
        }

        // crossZ > 0 → palma virada para a camera traseira (mao direita).
        // Se o cubo aparecer ao inverso, troque ">" por "<".
        function isPalmFacingCamera(lm) {
            const crossZ = (lm[5].x - lm[0].x) * (lm[17].y - lm[0].y)
                         - (lm[5].y - lm[0].y) * (lm[17].x - lm[0].x);
            return crossZ > 0;
        }

        // Eixo pulso->dedo_medio mais horizontal do que vertical (mao deitada)
        function isPalmFlat(lm) {
            const dx = Math.abs(lm[9].x - lm[0].x);
            const dy = Math.abs(lm[9].y - lm[0].y);
            return dx > dy * 0.7; // angulo < ~55 graus da horizontal
        }

        // Callback do MediaPipe — chamado a cada frame processado
        function onHandResults(results) {
            lmCtx.clearRect(0, 0, landmarkCanvas.width, landmarkCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if (handObject) handObject.visible = false;
                document.getElementById('hand-status').textContent = 'Não detectada';
                return;
            }

            const lm  = results.multiHandLandmarks[0];
            const vw  = landmarkCanvas.width;
            const vh  = landmarkCanvas.height;
            const area = document.getElementById('camera-area');
            const cw  = area.clientWidth;
            const ch  = area.clientHeight;

            // Desenha esqueleto da mão no canvas 2D
            drawHandSkeleton(lm, vw, vh);

            const palmVisible = isPalmFacingCamera(lm) && isPalmFlat(lm);

            // Centro da palma = media entre pulso(0) e bases dos dedos(5,9,13,17)
            const palmIdx = [0, 5, 9, 13, 17];
            let px = 0, py = 0;
            palmIdx.forEach(i => { px += lm[i].x; py += lm[i].y; });
            px /= palmIdx.length;
            py /= palmIdx.length;

            if (handObject) {
                handObject.position.x =  px * cw - cw / 2;
                handObject.position.y = -(py * ch - ch / 2);
                handObject.visible = palmVisible;
            }

            document.getElementById('hand-status').textContent =
                palmVisible ? 'Palma aberta ✓' : (isPalmFacingCamera(lm) ? 'Inclinada' : 'Dorso');
        }

        // Desenha os 21 pontos e conexões da mão
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
        ];

        function drawHandSkeleton(lm, vw, vh) {
            lmCtx.strokeStyle = 'rgba(0, 255, 200, 0.85)';
            lmCtx.lineWidth   = 2;
            HAND_CONNECTIONS.forEach(([a, b]) => {
                lmCtx.beginPath();
                lmCtx.moveTo(lm[a].x * vw, lm[a].y * vh);
                lmCtx.lineTo(lm[b].x * vw, lm[b].y * vh);
                lmCtx.stroke();
            });
            lm.forEach(pt => {
                lmCtx.beginPath();
                lmCtx.arc(pt.x * vw, pt.y * vh, 4, 0, Math.PI * 2);
                lmCtx.fillStyle = '#00ffcc';
                lmCtx.fill();
            });
        }

        // Loop de envio de frames para o MediaPipe
        async function processHandFrame() {
            if (video.readyState >= 2) {
                await handsDetector.send({ image: video });
            }
            requestAnimationFrame(processHandFrame);
        }

        // ── Three.js — cubo sobre a mão ───────────────────────────
        function initThreeOverlay() {
            const area = document.getElementById('camera-area');
            const w = area.clientWidth  || window.innerWidth;
            const h = area.clientHeight || Math.round(window.innerHeight * 0.6);

            threeRenderer = new THREE.WebGLRenderer({ canvas: handCanvas, alpha: true, antialias: true });
            threeRenderer.setSize(w, h);
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            threeScene = new THREE.Scene();
            threeOrthoCamera = new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, -500, 500);

            threeScene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dl = new THREE.DirectionalLight(0x00eeff, 1.2);
            dl.position.set(1, 2, 3);
            threeScene.add(dl);

            handObject = new THREE.Mesh(
                new THREE.BoxGeometry(55, 55, 55),
                new THREE.MeshPhongMaterial({
                    color: 0x00ffcc,
                    transparent: true,
                    opacity: 0.88,
                    shininess: 120
                })
            );
            handObject.visible = false;
            threeScene.add(handObject);

            (function animate() {
                requestAnimationFrame(animate);
                if (handObject.visible) {
                    handObject.rotation.x += 0.02;
                    handObject.rotation.y += 0.03;
                }
                threeRenderer.render(threeScene, threeOrthoCamera);
            })();

            window.addEventListener('resize', () => {
                const nw = area.clientWidth  || window.innerWidth;
                const nh = area.clientHeight || Math.round(window.innerHeight * 0.6);
                threeRenderer.setSize(nw, nh);
                threeOrthoCamera.left   = -nw / 2;
                threeOrthoCamera.right  =  nw / 2;
                threeOrthoCamera.top    =  nh / 2;
                threeOrthoCamera.bottom = -nh / 2;
                threeOrthoCamera.updateProjectionMatrix();
            });
        }

        // ── Bussola do dispositivo ────────────────────────────────
        function initOrientation() {
            let absoluteSupported = false; // true assim que deviceorientationabsolute responder

            const handler = (e) => {
                let h = null;
                let reliable = false;

                if (e.webkitCompassHeading != null) {
                    // iOS — sempre norte verdadeiro
                    h = e.webkitCompassHeading;
                    reliable = true;
                } else if (e.alpha != null && e.absolute) {
                    // Android com sensor absoluto (mais confiavel)
                    h = (360 - e.alpha + 360) % 360;
                    reliable = true;
                    absoluteSupported = true;
                } else if (e.alpha != null && !absoluteSupported) {
                    // Fallback relativo: aceita apenas se o sensor absoluto nunca respondeu.
                    // Alpha relativo nao aponta para o norte — usado so como ultimo recurso.
                    h = (360 - e.alpha + 360) % 360;
                }

                if (h === null) return;

                heading = suavizarAngulo(heading, h, 0.2);

                if (reliable) {
                    // So marca compassActive para leituras confiaveis; assim o GPS heading
                    // continua sendo usado como fallback em dispositivos sem sensor absoluto.
                    compassActive = true;
                }

                document.getElementById('st-bus').textContent = reliable ? 'Bussola OK' : 'Bussola~';
                document.getElementById('st-bus').classList.toggle('ok', reliable);

                // Atualiza apenas exibicao de heading e seta — evita recalcular POIs/rota a 60fps
                atualizarDirecao();
            };

            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', handler); })
                    .catch(() => {});
            } else {
                window.addEventListener('deviceorientationabsolute', handler, true);
                window.addEventListener('deviceorientation', handler);
            }
        }

        // Atualiza heading display, seta e Street View sem recalcular POIs/rota
        function atualizarDirecao() {
            document.getElementById('heading').textContent = Math.round(getHeading());
            if (bearing !== 0) {
                const rawOffset = (bearing - getHeading() + 360) % 360;
                const dir = Math.round(rawOffset / 45) % 8;
                document.getElementById('arrows').textContent =
                    ['↑','↗','→','↘','↓','↙','←','↖'][dir];
                const arrowSvg = document.getElementById('arrow-svg');
                if (arrowSvg) arrowSvg.style.transform = `rotate(${rawOffset}deg)`;
            }
            updateStreetView();
        }

        // ── GPS ───────────────────────────────────────────────────
        function initGPS() {
            if (!navigator.geolocation) { simulateGPS(); return; }
            navigator.geolocation.watchPosition(
                pos => {
                    userPosition.lat = pos.coords.latitude;
                    userPosition.lng = pos.coords.longitude;

                    // Fusao GPS+bussola: em movimento o GPS heading e mais preciso
                    const speed   = pos.coords.speed;
                    const gpsHead = pos.coords.heading;
                    if (gpsHead != null && !isNaN(gpsHead) && speed != null && speed > 0.4) {
                        heading = suavizarAngulo(heading, gpsHead, 0.4);
                    } else if (!compassActive && gpsHead != null && !isNaN(gpsHead)) {
                        heading = suavizarAngulo(heading, gpsHead, 0.2);
                    }

                    document.getElementById('st-gps').textContent = 'GPS OK';
                    document.getElementById('st-gps').classList.add('ok');
                    updateMap();

                    // Recalcula rota apenas ao mover >10 m (debounce 1.2 s)
                    const moveu = !lastRoutePos
                        || calcDistanciaSimples(userPosition, lastRoutePos) > 10;
                    if (moveu) {
                        clearTimeout(routeTimer);
                        routeTimer = setTimeout(() => {
                            lastRoutePos = { ...userPosition };
                            if (closestPoi) calcularRota(userPosition, closestPoi);
                        }, 1200);
                    }
                },
                () => simulateGPS(),
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function simulateGPS() {
            setInterval(() => {
                userPosition.lat += (Math.random() - 0.5) * 0.001;
                userPosition.lng += (Math.random() - 0.5) * 0.001;
                updateMap();
            }, 5000);
        }

        // ── Google Maps ───────────────────────────────────────────
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: userPosition,
                zoom: 18,
                styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }]
            });

            directionsService  = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map,
                suppressMarkers: true,
                polylineOptions: { strokeColor: '#4BD4D2', strokeWeight: 5 }
            });

            userMarker = new google.maps.Marker({
                position: userPosition,
                map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: '#4285F4', fillOpacity: 1,
                    strokeColor: '#fff',  strokeWeight: 2
                }
            });
            pois.forEach(poi => new google.maps.Marker({ position: poi, map, title: poi.name }));
            updateMap();
        }

        function calcularRota(inicio, destino) {
            if (!directionsService || !directionsRenderer) return;
            directionsService.route({
                origin:      { lat: inicio.lat,  lng: inicio.lng },
                destination: { lat: destino.lat, lng: destino.lng },
                travelMode:  google.maps.TravelMode.WALKING
            }, (response, status) => {
                if (status !== 'OK') return;
                directionsRenderer.setDirections(response);
                const leg = response.routes[0].legs[0];
                routePath = response.routes[0].overview_path; // salva para bearing efetivo
                document.getElementById('distance').textContent =
                    leg.distance.text + ' (~' + leg.duration.text + ')';
                const navPill = document.getElementById('nav-pill');
                if (navPill) navPill.textContent = leg.distance.text + '  ' + leg.duration.text;
            });
        }

        function updateMap() {
            if (!userMarker || !map) return;
            userMarker.setPosition(userPosition);
            map.setCenter(userPosition);

            let minDist = Infinity;
            pois.forEach(poi => {
                const d = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(userPosition.lat, userPosition.lng),
                    new google.maps.LatLng(poi.lat, poi.lng)
                );
                if (d < minDist) { minDist = d; closestPoi = poi; }
            });
            minDistToClosestPoi = minDist;

            document.getElementById('lat').textContent     = userPosition.lat.toFixed(5);
            document.getElementById('lng').textContent     = userPosition.lng.toFixed(5);
            document.getElementById('heading').textContent = Math.round(getHeading());
            // Distancia linha reta enquanto a rota de caminhada nao chegar
            if (!lastRoutePos) {
                document.getElementById('distance').textContent = Math.round(minDist) + ' m';
                const navPill = document.getElementById('nav-pill');
                if (navPill) navPill.textContent = Math.round(minDist) + ' m';
            }

            bearing = google.maps.geometry.spherical.computeHeading(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(closestPoi.lat, closestPoi.lng)
            );
            const rawOffset = (bearing - getHeading() + 360) % 360;
            const dir = Math.round(rawOffset / 45) % 8;
            document.getElementById('arrows').textContent =
                ['↑','↗','→','↘','↓','↙','←','↖'][dir];
            const arrowSvg = document.getElementById('arrow-svg');
            if (arrowSvg) arrowSvg.style.transform = `rotate(${rawOffset}deg)`;

            updateStreetView();
        }

        // ── Street View ───────────────────────────────────────────
        function initStreetView() {
            svService = new google.maps.StreetViewService();
            svPanorama = new google.maps.StreetViewPanorama(
                document.getElementById('sv-view'),
                {
                    position: userPosition,
                    pov: { heading: getHeading(), pitch: 0 },
                    disableDefaultUI: true,
                    linksControl: false,
                    panControl: false,
                    zoomControl: false,
                    fullscreenControl: false,
                    motionTracking: false,
                    motionTrackingControl: false,
                    clickToGo: false
                }
            );

            document.getElementById('sv-toggle').addEventListener('click', () => {
                svOpen = !svOpen;
                document.getElementById('sv-panel').classList.toggle('open', svOpen);
                if (svOpen) updateStreetView();
            });

            document.getElementById('sv-snap').addEventListener('click', snapToStreetView);
            document.getElementById('sv-calibrate').addEventListener('click', calibrateHeadingFromLinks);
        }

        function updateStreetView() {
            if (!svPanorama || !svOpen) return;
            svPanorama.setPosition(userPosition);
            svPanorama.setPov({ heading: getHeading(), pitch: 0 });
        }

        // Snaps GPS position to the nearest outdoor Street View panorama
        async function snapToStreetView() {
            if (!svService) return;
            const el = document.getElementById('sv-status');
            el.textContent = '...';
            try {
                const res = await svService.getPanorama({
                    location: userPosition,
                    radius: 80,
                    source: google.maps.StreetViewSource.OUTDOOR
                });
                const loc = res.data.location.latLng;
                userPosition.lat = loc.lat();
                userPosition.lng = loc.lng();
                updateMap();
                updateStreetView();
                el.textContent = 'snap ok';
            } catch (_) {
                el.textContent = 'sem sv';
            }
        }

        // Finds the road direction (panorama link) closest to the current compass
        // heading and applies the difference as a heading correction offset.
        async function calibrateHeadingFromLinks() {
            if (!svService) return;
            const el = document.getElementById('sv-status');
            el.textContent = '...';
            try {
                const res = await svService.getPanorama({
                    location: userPosition,
                    radius: 80,
                    source: google.maps.StreetViewSource.OUTDOOR
                });
                const links = res.data.links || [];
                if (!links.length) { el.textContent = 'sem links'; return; }

                // Build candidate road directions (each link + its opposite)
                const candidates = [];
                links.forEach(l => {
                    candidates.push(l.heading);
                    candidates.push((l.heading + 180) % 360);
                });

                // Pick candidate closest to raw device heading
                let best = null, bestDiff = Infinity;
                candidates.forEach(h => {
                    const diff = Math.abs(((h - heading + 540) % 360) - 180);
                    if (diff < bestDiff) { bestDiff = diff; best = h; }
                });

                if (best !== null && bestDiff < 45) {
                    headingOffset = ((best - heading) + 540) % 360 - 180;
                    updateStreetView();
                    el.textContent = (headingOffset >= 0 ? '+' : '') + Math.round(headingOffset) + '°';
                } else {
                    headingOffset = 0;
                    el.textContent = 'ok';
                }
            } catch (_) {
                el.textContent = 'erro';
            }
        }

        // ── Overlay de navegacao AR ───────────────────────────────
        function initNavOverlay() {
            navCanvas = document.getElementById('nav-canvas');
            navCtx    = navCanvas.getContext('2d');
            syncNavCanvas();
            window.addEventListener('resize', syncNavCanvas);
            navLoop();
        }

        // Bearing usando o segmento da rota mais proximo; cai de volta para linha reta
        function getEffectiveBearing() {
            if (!routePath || routePath.length < 2) return bearing;
            const userLL = new google.maps.LatLng(userPosition.lat, userPosition.lng);
            let best = 0, bestD = Infinity;
            routePath.forEach((pt, i) => {
                const d = google.maps.geometry.spherical.computeDistanceBetween(userLL, pt);
                if (d < bestD) { bestD = d; best = i; }
            });
            const nxt = Math.min(best + 1, routePath.length - 1);
            if (nxt === best) return bearing;
            return google.maps.geometry.spherical.computeHeading(routePath[best], routePath[nxt]);
        }

        function drawNavGuide() {
            if (!navCanvas) return;
            const w = navCanvas.width, h = navCanvas.height;
            navCtx.clearRect(0, 0, w, h);

            if (minDistToClosestPoi < 25) { drawArrival(w, h); return; }

            const effB   = getEffectiveBearing();
            const offset = ((effB - getHeading() + 540) % 360) - 180;

            if (Math.abs(offset) > 110) { drawWrongWay(w, h); return; }

            drawTrail(offset, w, h);
        }

        function drawTrail(offset, w, h) {
            const clamp = Math.max(-75, Math.min(75, offset));
            const vpX   = w / 2 + (clamp / 75) * w * 0.36;
            const vpY   = h * 0.42;
            const midX  = w / 2, bY = h * 0.57;
            const bLx   = w * 0.18, bRx = w * 0.82;

            // Controle de curvatura
            const lean = (offset / 180) * w * 0.15;
            const cpX  = midX + lean, cpY = h * 0.63;
            const cpLx = bLx * 0.52 + vpX * 0.48 + lean * 0.55;
            const cpRx = bRx * 0.52 + vpX * 0.48 + lean * 0.55;
            const cpEY = h * 0.63;

            // Preenchimento com gradiente
            navCtx.save();
            navCtx.beginPath();
            navCtx.moveTo(bLx, bY);
            navCtx.quadraticCurveTo(cpLx, cpEY, vpX - 1, vpY);
            navCtx.lineTo(vpX + 1, vpY);
            navCtx.quadraticCurveTo(cpRx, cpEY, bRx, bY);
            navCtx.closePath();
            const gf = navCtx.createLinearGradient(0, vpY, 0, bY);
            gf.addColorStop(0,    'rgba(0,140,255,0.00)');
            gf.addColorStop(0.25, 'rgba(0,140,255,0.08)');
            gf.addColorStop(1,    'rgba(0,140,255,0.28)');
            navCtx.fillStyle = gf;
            navCtx.fill();
            navCtx.restore();

            // Bordas curvas com brilho
            const drawEdge = (x0, cpEX) => {
                navCtx.save();
                navCtx.shadowColor = '#0088ff'; navCtx.shadowBlur = 22;
                navCtx.strokeStyle = 'rgba(70,175,255,0.82)'; navCtx.lineWidth = 2;
                navCtx.beginPath();
                navCtx.moveTo(x0, bY);
                navCtx.quadraticCurveTo(cpEX, cpEY, vpX, vpY);
                navCtx.stroke();
                navCtx.restore();
            };
            drawEdge(bLx, cpLx);
            drawEdge(bRx, cpRx);

            // Linha central tracejada
            navCtx.save();
            navCtx.setLineDash([5, 13]);
            navCtx.shadowColor = '#00aaff'; navCtx.shadowBlur = 9;
            navCtx.strokeStyle = 'rgba(120,210,255,0.48)'; navCtx.lineWidth = 1.5;
            navCtx.beginPath();
            navCtx.moveTo(midX, bY);
            navCtx.quadraticCurveTo(cpX, cpY, vpX, vpY);
            navCtx.stroke();
            navCtx.setLineDash([]);
            navCtx.restore();

            // Chevrons animados sobre a bezier central
            // t=0: proximo ao usuario (base), t=1: ponto de fuga (longe)
            navAnimPhase = (navAnimPhase + 0.013) % 1;
            for (let i = 0; i < 4; i++) {
                const t  = (navAnimPhase + i / 4) % 1;
                const mt = 1 - t;
                // Ponto na bezier P0=(midX,bY) P1=(cpX,cpY) P2=(vpX,vpY)
                const cx = mt * mt * midX + 2 * mt * t * cpX + t * t * vpX;
                const cy = mt * mt * bY   + 2 * mt * t * cpY + t * t * vpY;
                // Tangente para rotacionar o chevron com a curva
                const tdx = 2 * mt * (cpX - midX) + 2 * t * (vpX - cpX);
                const tdy = 2 * mt * (cpY - bY)   + 2 * t * (vpY - cpY);
                const size = 5 + 14 * mt;
                navCtx.save();
                navCtx.globalAlpha = 0.2 + 0.72 * mt;
                navCtx.translate(cx, cy);
                navCtx.rotate(Math.atan2(tdy, tdx) + Math.PI / 2);
                navCtx.shadowColor = '#00aaff'; navCtx.shadowBlur = size * 1.1;
                navCtx.fillStyle   = 'rgba(80,200,255,0.92)';
                navCtx.beginPath();
                navCtx.moveTo(0, -size);
                navCtx.lineTo( size * 0.65,  size * 0.35);
                navCtx.lineTo(0,             size * 0.05);
                navCtx.lineTo(-size * 0.65,  size * 0.35);
                navCtx.closePath();
                navCtx.fill();
                navCtx.restore();
            }
        }

        function drawWrongWay(w, h) {
            const pw = 188, ph = 36, px = (w - pw) / 2, py = 52;
            navCtx.save();
            navCtx.fillStyle = 'rgba(0,0,0,0.62)';
            rrect(navCtx, px, py, pw, ph, 18);
            navCtx.fill();
            navCtx.font = 'bold 15px Arial'; navCtx.textAlign = 'center';
            navCtx.fillStyle = '#ff5050';
            navCtx.shadowColor = '#ff2200'; navCtx.shadowBlur = 12;
            navCtx.fillText('↩  Vire-se', w / 2, py + ph / 2 + 5.5);
            navCtx.restore();
        }

        function drawArrival(w, h) {
            const pulse = 0.72 + 0.28 * Math.sin(Date.now() * 0.004);
            navCtx.save();
            navCtx.shadowColor = '#00ff88'; navCtx.shadowBlur = 35;
            navCtx.strokeStyle = `rgba(0,255,136,${0.65 * pulse})`;
            navCtx.lineWidth   = 3;
            navCtx.beginPath();
            navCtx.arc(w / 2, h * 0.44, 42 * pulse, 0, Math.PI * 2);
            navCtx.stroke();
            navCtx.font = 'bold 18px Arial'; navCtx.textAlign = 'center';
            navCtx.fillStyle = 'rgba(0,255,136,0.95)';
            navCtx.shadowBlur = 14;
            navCtx.fillText('Voce chegou!', w / 2, h * 0.44 + 7);
            navCtx.restore();
        }

        function rrect(ctx, x, y, rw, rh, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + rw - r, y);
            ctx.quadraticCurveTo(x + rw, y,      x + rw, y + r);
            ctx.lineTo(x + rw, y + rh - r);
            ctx.quadraticCurveTo(x + rw, y + rh, x + rw - r, y + rh);
            ctx.lineTo(x + r,  y + rh);
            ctx.quadraticCurveTo(x, y + rh,      x, y + rh - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y,            x + r, y);
            ctx.closePath();
        }

        function navLoop() {
            drawNavGuide();
            requestAnimationFrame(navLoop);
        }

        // ── Inicialização ─────────────────────────────────────────
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            initCamera();
            initThreeOverlay();
            initOrientation();
            initGPS();
            initMap();
            initStreetView();
            initNavOverlay();
            initHandTracking();
        });

        document.getElementById('exit-btn').addEventListener('click', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            location.reload();
        });
    </script>
</body>
