<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maps Tour AR</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; overflow: hidden; }
        #initial-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; }
        #initial-screen h1 { font-size: 2em; margin-bottom: 20px; }
        #start-btn { padding: 15px 30px; font-size: 1.2em; background: #4CAF50; border: none; border-radius: 5px; cursor: pointer; }
        #ar-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #status-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-size: 0.8em; z-index: 5; }
        #arrows { position: absolute; bottom: 50%; left: 50%; transform: translate(-50%, 50%); font-size: 2em; color: cyan; z-index: 5; }
        #map { position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; z-index: 5; }
        #exit-btn { position: absolute; top: 10px; right: 10px; padding: 10px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; z-index: 5; }
        #detection { position: absolute; top: 50%; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-size: 0.8em; z-index: 5; }
        @media (max-width: 768px) { #status-panel, #detection { font-size: 0.7em; } }
    </style>
    <!-- A-Frame CDN -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js CDN -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Google Maps API (use a valid key or simulate) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&libraries=geometry"></script>
    <!-- TensorFlow.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <!-- COCO-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    <!-- MediaPipe Hands (for simulation, but using TF for detection) -->
    <!-- Note: For simplicity, using COCO-SSD for object detection -->
</head>
<body>
    <!-- Tela Inicial -->
    <div id="initial-screen">
        <h1>Maps Tour AR</h1>
        <button id="start-btn">Iniciar Navegação</button>
    </div>

    <!-- Cena AR -->
    <div id="ar-scene">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
            <a-camera id="camera" position="0 0 0" look-controls-enabled="false"></a-camera>
            <!-- Trilha 3D cyan -->
            <a-entity id="trail" geometry="primitive: cylinder; radius: 0.01; height: 10" material="color: cyan" position="0 0 -5" rotation="0 0 0"></a-entity>
            <!-- Marcador 3D vermelho no destino -->
            <a-entity id="marker" geometry="primitive: sphere; radius: 0.1" material="color: red" position="0 0 -10" animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; loop: true; easing: easeInOutQuad" visible="false"></a-entity>
        </a-scene>
        <!-- Painel de Status -->
        <div id="status-panel">
            GPS: <span id="gps">Simulando...</span><br>
            Compass: <span id="compass">0°</span><br>
            Distância: <span id="distance">0m</span><br>
            Confidence: <span id="confidence">0%</span>
        </div>
        <!-- Setas Dinâmicas -->
        <div id="arrows">↑</div>
        <!-- Mapa Google Maps -->
        <div id="map"></div>
        <!-- Detecção de Objetos -->
        <div id="detection">Objetos: Nenhum</div>
        <!-- Botão Sair -->
        <button id="exit-btn">Sair</button>
    </div>

    <script>
        // Dados hardcoded de 3 POIs em Aracaju
        const pois = [
            { name: 'Praia de Atalaia', lat: -10.9472, lng: -37.0731 },
            { name: 'Museu da Gente Sergipana', lat: -10.9117, lng: -37.0714 },
            { name: 'Parque da Sementeira', lat: -10.9356, lng: -37.0658 }
        ];
        let currentPoiIndex = 0;
        let userPosition = { lat: -10.9472, lng: -37.0731 }; // Simulação inicial
        let compassHeading = 0;
        let map, marker;
        let model;
        let video;

        // Função para iniciar navegação
        function iniciarNavegacao() {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('ar-scene').style.display = 'block';
            initMap();
            initAR();
            initDetection();
            updateNavigation();
        }

        // Inicializar mapa
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: userPosition,
                zoom: 15,
                disableDefaultUI: true
            });
            marker = new google.maps.Marker({
                position: pois[currentPoiIndex],
                map: map,
                title: pois[currentPoiIndex].name
            });
        }

        // Inicializar AR
        function initAR() {
            // A-Frame e AR.js já carregados
            // Atualizar trilha e marcador baseado em posição
        }

        // Inicializar detecção de objetos
        async function initDetection() {
            model = await cocoSsd.load();
            video = document.createElement('video');
            video.width = 320;
            video.height = 240;
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                video.srcObject = stream;
                video.play();
                detectObjects();
            });
        }

        // Detectar objetos
        async function detectObjects() {
            if (video.readyState === 4) {
                const predictions = await model.detect(video);
                document.getElementById('detection').innerText = 'Objetos: ' + predictions.map(p => p.class).join(', ');
            }
            requestAnimationFrame(detectObjects);
        }

        // Atualizar navegação
        function updateNavigation() {
            // Simular GPS se não disponível
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('gps').innerText = `${userPosition.lat.toFixed(4)}, ${userPosition.lng.toFixed(4)}`;
                    updateMap();
                }, () => {
                    // Simulação
                    userPosition.lat += 0.0001;
                    document.getElementById('gps').innerText = `${userPosition.lat.toFixed(4)}, ${userPosition.lng.toFixed(4)}`;
                });
            }

            // Simular Compass
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', e => {
                    compassHeading = e.alpha || 0;
                    document.getElementById('compass').innerText = `${compassHeading.toFixed(0)}°`;
                    updateArrows();
                });
            } else {
                // Simulação
                setInterval(() => {
                    compassHeading = (compassHeading + 1) % 360;
                    document.getElementById('compass').innerText = `${compassHeading.toFixed(0)}°`;
                    updateArrows();
                }, 100);
            }

            // Calcular distância e direção
            const dest = pois[currentPoiIndex];
            const distance = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(dest.lat, dest.lng)
            );
            document.getElementById('distance').innerText = `${distance.toFixed(0)}m`;
            document.getElementById('confidence').innerText = distance < 50 ? 'Alta' : 'Baixa';

            // Mostrar marcador se perto
            document.getElementById('marker').setAttribute('visible', distance < 100);

            // Atualizar trilha (simplificado)
            const angle = google.maps.geometry.spherical.computeHeading(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(dest.lat, dest.lng)
            ) - compassHeading;
            document.getElementById('trail').setAttribute('rotation', `0 ${angle} 0`);

            requestAnimationFrame(updateNavigation);
        }

        // Atualizar setas
        function updateArrows() {
            const dest = pois[currentPoiIndex];
            const angle = google.maps.geometry.spherical.computeHeading(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(dest.lat, dest.lng)
            ) - compassHeading;
            let arrow = '↑';
            if (Math.abs(angle) > 45) {
                if (angle > 0) arrow = '←';
                else arrow = '→';
            }
            document.getElementById('arrows').innerText = arrow;
        }

        // Atualizar mapa
        function updateMap() {
            map.setCenter(userPosition);
            marker.setPosition(pois[currentPoiIndex]);
        }

        // Sair
        function sair() {
            document.getElementById('ar-scene').style.display = 'none';
            document.getElementById('initial-screen').style.display = 'flex';
        }

        // Eventos
        document.getElementById('start-btn').addEventListener('click', iniciarNavegacao);
        document.getElementById('exit-btn').addEventListener('click', sair);
    </script>
</body>
</html>
