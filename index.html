<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação AR com Mapa</title>
    <!-- Scripts necessários -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&libraries=geometry,directions"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #initial-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00bcd4, #0097a7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #main-app {
            display: none;
            width: 100%;
            height: 100%;
        }
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 1;
        }
        #ar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 2;
        }
        #a-scene {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #status-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
        #exit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
        .arrow {
            position: absolute;
            font-size: 24px;
            color: red;
        }
    </style>
</head>
<body>
    <!-- Tela inicial -->
    <div id="initial-screen">
        <h1>Bem-vindo ao Navegador AR</h1>
        <button id="start-btn">Iniciar</button>
    </div>

    <!-- Aplicação principal -->
    <div id="main-app">
        <!-- Painel de status -->
        <div id="status-panel">
            <div>GPS: <span id="gps-lat">--</span>, <span id="gps-lng">--</span></div>
            <div>Bússola: <span id="compass">--</span>°</div>
            <div>Distância: <span id="distance">--</span> m</div>
            <div>Confiança: <span id="confidence">--</span>%</div>
        </div>
        <!-- Botão sair -->
        <button id="exit-btn">Sair</button>
        <!-- Container do mapa -->
        <div id="map-container"></div>
        <!-- Container AR -->
        <div id="ar-container">
            <a-scene id="a-scene" embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
                <!-- Câmera AR -->
                <a-camera id="camera" gps-camera="simulateLatitude: -10.9472; simulateLongitude: -37.0731;" rotation-reader></a-camera>
                <!-- Trilha cyan 3D -->
                <a-entity id="trail" line="color: cyan; opacity: 0.8;">
                    <a-sphere position="0 0 -5" radius="0.1" color="cyan"></a-sphere>
                </a-entity>
                <!-- Setas dinâmicas -->
                <a-entity id="arrows" position="0 0 -3">
                    <a-text value="↑" position="0 1 0" align="center" color="red" look-at="#camera"></a-text>
                    <a-text value="←" position="-1 0 0" align="center" color="red" look-at="#camera"></a-text>
                    <a-text value="→" position="1 0 0" align="center" color="red" look-at="#camera"></a-text>
                </a-entity>
                <!-- Marcadores 3D para POIs -->
                <a-entity gps-entity-place="latitude: -10.9472; longitude: -37.0731;" look-at="#camera">
                    <a-sphere radius="0.5" color="green" animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; loop: true;"></a-sphere>
                    <a-text value="POI 1" position="0 1 0" align="center"></a-text>
                </a-entity>
                <a-entity gps-entity-place="latitude: -10.9500; longitude: -37.0800;" look-at="#camera">
                    <a-sphere radius="0.5" color="green" animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; loop: true;"></a-sphere>
                    <a-text value="POI 2" position="0 1 0" align="center"></a-text>
                </a-entity>
                <a-entity gps-entity-place="latitude: -10.9600; longitude: -37.0900;" look-at="#camera">
                    <a-sphere radius="0.5" color="green" animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; loop: true;"></a-sphere>
                    <a-text value="POI 3" position="0 1 0" align="center"></a-text>
                </a-entity>
            </a-scene>
        </div>
    </div>

    <script>
        // Variáveis globais
        let map, directionsService, directionsRenderer;
        let currentPosition = { lat: -10.9472, lng: -37.0731 }; // Simulação inicial
        let destination = { lat: -10.9500, lng: -37.0800 }; // Destino exemplo
        let compassHeading = 0;
        let cocoModel;
        let video;

        // Inicializar tela inicial
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initApp();
        });

        // Botão sair
        document.getElementById('exit-btn').addEventListener('click', () => {
            location.reload();
        });

        // Inicializar aplicação
        async function initApp() {
            // Inicializar mapa
            initMap();
            // Carregar modelo COCO-SSD
            cocoModel = await cocoSSD.load();
            // Iniciar GPS e bússola
            initGPS();
            initCompass();
            // Iniciar detecção de objetos
            initObjectDetection();
            // Atualizar setas
            updateArrows();
        }

        // Inicializar Google Maps
        function initMap() {
            map = new google.maps.Map(document.getElementById('map-container'), {
                center: currentPosition,
                zoom: 15,
                mapTypeId: google.maps.MapTypeId.ROADMAP
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                polylineOptions: { strokeColor: 'blue' }
            });
            // Desenhar rota
            calculateAndDisplayRoute();
        }

        // Calcular e exibir rota
        function calculateAndDisplayRoute() {
            directionsService.route({
                origin: currentPosition,
                destination: destination,
                travelMode: google.maps.TravelMode.DRIVING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                } else {
                    console.error('Erro ao calcular rota:', status);
                }
            });
        }

        // Inicializar GPS
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    currentPosition = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    updateStatusPanel();
                    map.setCenter(currentPosition);
                    calculateAndDisplayRoute();
                }, () => {
                    // Simular GPS se não disponível
                    setInterval(() => {
                        currentPosition.lat += 0.0001;
                        updateStatusPanel();
                        map.setCenter(currentPosition);
                        calculateAndDisplayRoute();
                    }, 1000);
                }, { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 });
            }
        }

        // Inicializar bússola
        function initCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    compassHeading = event.alpha || 0;
                    updateStatusPanel();
                    updateArrows();
                });
            } else {
                // Simular bússola
                setInterval(() => {
                    compassHeading = (compassHeading + 1) % 360;
                    updateStatusPanel();
                    updateArrows();
                }, 100);
            }
        }

        // Atualizar painel de status
        function updateStatusPanel() {
            document.getElementById('gps-lat').textContent = currentPosition.lat.toFixed(6);
            document.getElementById('gps-lng').textContent = currentPosition.lng.toFixed(6);
            document.getElementById('compass').textContent = compassHeading.toFixed(1);
            document.getElementById('distance').textContent = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(currentPosition.lat, currentPosition.lng),
                new google.maps.LatLng(destination.lat, destination.lng)
            ).toFixed(0);
            document.getElementById('confidence').textContent = '95'; // Exemplo
        }

        // Atualizar setas dinâmicas
        function updateArrows() {
            const camera = document.getElementById('camera');
            // Lógica para ajustar setas baseada em GPS e bússola
            // Simplificado
        }

        // Inicializar detecção de objetos
        function initObjectDetection() {
            video = document.createElement('video');
            video.width = 640;
            video.height = 480;
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.play();
                detectObjects();
            });
        }

        // Detectar objetos
        async function detectObjects() {
            const predictions = await cocoModel.detect(video);
            // Processar predições e atualizar AR
            setTimeout(detectObjects, 100);
        }
    </script>
</body>
</html>
