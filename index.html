<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maps Tour - Experiência de Realidade Aumentada baseada em Mapas">
    <title>Maps Tour - AR Experience</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="src\css\style.css">
    <link rel="stylesheet" href="src\css\components.css">
    <link rel="stylesheet" href="src\css\responsive.css">

    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active" data-screen="home">
        <div class="home-container">
            <div class="home-content">
                <h1 class="home-title">Maps Tour</h1>
                <p class="home-description">Explore pontos de interesse em realidade aumentada. Descubra locais históricos e culturais através de uma experiência imersiva e interativa.</p>
                <button id="start-experience" class="btn btn-primary btn-large">
                    <span>Iniciar Tour AR</span>
                </button>
            </div>
        </div>
    </div>

    <!-- AR Screen -->
    <div id="ar-screen" style="display: none;">
        <button id="exit-ar" class="btn btn-secondary btn-exit" aria-label="Sair da experiência AR">
            <span>✕ Sair</span>
        </button>
        
        <!-- 🆕 PAINEL HUD COM GPS -->
        <div id="gps-display" class="gps-display"></div>
        
    <a-scene gps-camera>
        <!-- POI 1: Casa -->
        <a-gps-entity-place id="poi1" latitude="-10.9452" longitude="-37.0941">
            <a-cone 
                radius-bottom="0.6" 
                radius-top="0" 
                height="2.5" 
                position="0 4 0" 
                color="#0066FF"
                material="emissive: #0066FF; emissiveIntensity: 0.5;">
            </a-cone>
            <a-box 
                scale="2 2 2" 
                position="0 1 0" 
                color="#0066FF"
                material="emissive: #0066FF; emissiveIntensity: 0.4;">
            </a-box>
        </a-gps-entity-place>

        <!-- POI 2: Praia do Saco (Verde) -->
        <a-gps-entity-place id="poi2" latitude="-10.9510" longitude="-37.0715">
            <a-cone 
                radius-bottom="0.6" 
                radius-top="0" 
                height="2.5" 
                position="0 4 0" 
                color="#00FF00"
                material="emissive: #00FF00; emissiveIntensity: 0.5;">
            </a-cone>
            <a-box 
                scale="2 2 2" 
                position="0 1 0" 
                color="#00FF00"
                material="emissive: #00FF00; emissiveIntensity: 0.4;">
            </a-box>
        </a-gps-entity-place>

        <!-- POI 3: Serra de Itabaiana National Park (Vermelho) -->
        <a-gps-entity-place id="poi3" latitude="-10.2619" longitude="-37.1700">
            <a-cone 
                radius-bottom="0.6" 
                radius-top="0" 
                height="2.5" 
                position="0 4 0" 
                color="#FF0000"
                material="emissive: #FF0000; emissiveIntensity: 0.5;">
            </a-cone>
            <a-box 
                scale="2 2 2" 
                position="0 1 0" 
                color="#FF0000"
                material="emissive: #FF0000; emissiveIntensity: 0.4;">
            </a-box>
        </a-gps-entity-place>
    </a-scene>
    </div>

    <!-- Scripts -->
    <script src="src\js\data.js"></script>
    <script src="src\js\main.js"></script>
</body>
</html>
