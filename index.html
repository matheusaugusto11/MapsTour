<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maps Tour AR - Aracaju, Sergipe</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #initial-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #initial-screen h1 { font-size: 2.5em; margin-bottom: 20px; text-align: center; }
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }

        #main-container {
            display: none;
            position: fixed;
            inset: 0;
        }

        /* 60% superior: câmera */
        #camera-area {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 60%;
            overflow: hidden;
            background: #111;
        }

        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* canvas de landmarks e Three.js — em cima do vídeo */
        #landmark-canvas,
        #hand-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* 40% inferior: mapa */
        #map {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 40%;
        }

        #status-panel {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0, 0, 0, 0.72);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75em;
            line-height: 1.7;
            z-index: 10;
            pointer-events: none;
        }

        #exit-btn {
            position: absolute;
            top: 8px; left: 8px;
            padding: 8px 14px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            z-index: 10;
            touch-action: manipulation;
        }

        #arrows {
            position: absolute;
            top: calc(60% - 1.4em);
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        @media (max-width: 480px) {
            #initial-screen h1 { font-size: 1.8em; }
            #start-btn { font-size: 1em; }
            #status-panel { font-size: 0.65em; }
            #arrows { font-size: 2em; }
        }
    </style>
</head>
<body>

    <div id="initial-screen">
        <h1>Maps Tour AR<br>Aracaju</h1>
        <button id="start-btn">Iniciar</button>
    </div>

    <div id="main-container">
        <div id="camera-area">
            <video id="video" autoplay muted playsinline webkit-playsinline></video>
            <!-- landmarks da mão desenhados em 2D -->
            <canvas id="landmark-canvas"></canvas>
            <!-- cubo Three.js -->
            <canvas id="hand-canvas"></canvas>
        </div>

        <div id="map"></div>

        <div id="status-panel">
            <div>Lat: <span id="lat">--</span></div>
            <div>Lng: <span id="lng">--</span></div>
            <div>Heading: <span id="heading">--</span>°</div>
            <div>Dist. POI: <span id="distance">--</span> m</div>
            <div>Mão: <span id="hand-status">--</span></div>
        </div>

        <div id="arrows">↑</div>
        <button id="exit-btn">Sair</button>
    </div>

    <!-- MediaPipe Hands (detecta apenas mãos, sem detectar pessoa) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- Three.js para o cubo 3D -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHpEBTP49TY3aopjq0wvneYk-pGvoFzYY&libraries=geometry"></script>

    <script>
        const video          = document.getElementById('video');
        const landmarkCanvas = document.getElementById('landmark-canvas');
        const lmCtx          = landmarkCanvas.getContext('2d');
        const handCanvas     = document.getElementById('hand-canvas');

        let handsDetector;
        let threeRenderer, threeScene, threeOrthoCamera, handObject;
        let map, userMarker;

        const pois = [
            { name: 'Praia de Atalaia', lat: -10.9472, lng: -37.0731 },
            { name: 'Museu de Sergipe',  lat: -10.9117, lng: -37.0714 },
            { name: 'Centro Histórico',  lat: -10.9160, lng: -37.0720 }
        ];
        let userPosition = { lat: -10.9472, lng: -37.0731 };
        let heading = 0;
        let closestPoi = pois[0];

        // ── Câmera ────────────────────────────────────────────────
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: 'environment' },
                        width:  { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                video.addEventListener('loadedmetadata', syncCanvasSize);
                window.addEventListener('resize', syncCanvasSize);
            } catch (err) {
                alert('Câmera indisponível: ' + err.message);
            }
        }

        function syncCanvasSize() {
            const vw = video.videoWidth  || 640;
            const vh = video.videoHeight || 480;
            landmarkCanvas.width  = vw;
            landmarkCanvas.height = vh;
        }

        // ── MediaPipe Hands ───────────────────────────────────────
        // Detecta somente mãos (21 pontos) — não identifica pessoa
        async function initHandTracking() {
            document.getElementById('hand-status').textContent = 'Carregando...';

            handsDetector = new Hands({
                locateFile: file =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            handsDetector.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.75,
                minTrackingConfidence:  0.6
            });

            handsDetector.onResults(onHandResults);

            // aguarda o vídeo estar pronto antes de começar
            await new Promise(res => {
                if (video.readyState >= 1) { res(); return; }
                video.addEventListener('loadedmetadata', res, { once: true });
            });

            document.getElementById('hand-status').textContent = 'Pronto';
            processHandFrame();
        }

        // Callback do MediaPipe — chamado a cada frame processado
        function onHandResults(results) {
            lmCtx.clearRect(0, 0, landmarkCanvas.width, landmarkCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if (handObject) handObject.visible = false;
                document.getElementById('hand-status').textContent = 'Não detectada';
                return;
            }

            const lm  = results.multiHandLandmarks[0];
            const vw  = landmarkCanvas.width;
            const vh  = landmarkCanvas.height;
            const area = document.getElementById('camera-area');
            const cw  = area.clientWidth;
            const ch  = area.clientHeight;

            // Desenha esqueleto da mão no canvas 2D
            drawHandSkeleton(lm, vw, vh);

            // Centro da palma = média entre pulso(0) e bases dos dedos(5,9,13,17)
            const palmIdx = [0, 5, 9, 13, 17];
            let px = 0, py = 0;
            palmIdx.forEach(i => { px += lm[i].x; py += lm[i].y; });
            px /= palmIdx.length;
            py /= palmIdx.length;

            // MediaPipe devolve coordenadas normalizadas (0-1)
            // Mapeia para espaço ortográfico do Three.js (origem no centro)
            if (handObject) {
                handObject.position.x =  px * cw - cw / 2;
                handObject.position.y = -(py * ch - ch / 2);
                handObject.visible = true;
            }

            document.getElementById('hand-status').textContent = 'Detectada ✓';
        }

        // Desenha os 21 pontos e conexões da mão
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
        ];

        function drawHandSkeleton(lm, vw, vh) {
            lmCtx.strokeStyle = 'rgba(0, 255, 200, 0.85)';
            lmCtx.lineWidth   = 2;
            HAND_CONNECTIONS.forEach(([a, b]) => {
                lmCtx.beginPath();
                lmCtx.moveTo(lm[a].x * vw, lm[a].y * vh);
                lmCtx.lineTo(lm[b].x * vw, lm[b].y * vh);
                lmCtx.stroke();
            });
            lm.forEach(pt => {
                lmCtx.beginPath();
                lmCtx.arc(pt.x * vw, pt.y * vh, 4, 0, Math.PI * 2);
                lmCtx.fillStyle = '#00ffcc';
                lmCtx.fill();
            });
        }

        // Loop de envio de frames para o MediaPipe
        async function processHandFrame() {
            if (video.readyState >= 2) {
                await handsDetector.send({ image: video });
            }
            requestAnimationFrame(processHandFrame);
        }

        // ── Three.js — cubo sobre a mão ───────────────────────────
        function initThreeOverlay() {
            const area = document.getElementById('camera-area');
            const w = area.clientWidth  || window.innerWidth;
            const h = area.clientHeight || Math.round(window.innerHeight * 0.6);

            threeRenderer = new THREE.WebGLRenderer({ canvas: handCanvas, alpha: true, antialias: true });
            threeRenderer.setSize(w, h);
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            threeScene = new THREE.Scene();
            threeOrthoCamera = new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, -500, 500);

            threeScene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dl = new THREE.DirectionalLight(0x00eeff, 1.2);
            dl.position.set(1, 2, 3);
            threeScene.add(dl);

            handObject = new THREE.Mesh(
                new THREE.BoxGeometry(55, 55, 55),
                new THREE.MeshPhongMaterial({
                    color: 0x00ffcc,
                    transparent: true,
                    opacity: 0.88,
                    shininess: 120
                })
            );
            handObject.visible = false;
            threeScene.add(handObject);

            (function animate() {
                requestAnimationFrame(animate);
                if (handObject.visible) {
                    handObject.rotation.x += 0.02;
                    handObject.rotation.y += 0.03;
                }
                threeRenderer.render(threeScene, threeOrthoCamera);
            })();

            window.addEventListener('resize', () => {
                const nw = area.clientWidth  || window.innerWidth;
                const nh = area.clientHeight || Math.round(window.innerHeight * 0.6);
                threeRenderer.setSize(nw, nh);
                threeOrthoCamera.left   = -nw / 2;
                threeOrthoCamera.right  =  nw / 2;
                threeOrthoCamera.top    =  nh / 2;
                threeOrthoCamera.bottom = -nh / 2;
                threeOrthoCamera.updateProjectionMatrix();
            });
        }

        // ── GPS ───────────────────────────────────────────────────
        function initGPS() {
            if (!navigator.geolocation) { simulateGPS(); return; }
            navigator.geolocation.watchPosition(
                pos => {
                    userPosition.lat = pos.coords.latitude;
                    userPosition.lng = pos.coords.longitude;
                    heading = pos.coords.heading || 0;
                    updateMap();
                },
                () => simulateGPS(),
                { enableHighAccuracy: true, timeout: 27000, maximumAge: 30000 }
            );
        }

        function simulateGPS() {
            setInterval(() => {
                userPosition.lat += (Math.random() - 0.5) * 0.001;
                userPosition.lng += (Math.random() - 0.5) * 0.001;
                updateMap();
            }, 5000);
        }

        // ── Google Maps ───────────────────────────────────────────
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: userPosition,
                zoom: 15,
                styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }]
            });
            userMarker = new google.maps.Marker({
                position: userPosition,
                map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: '#4285F4', fillOpacity: 1,
                    strokeColor: '#fff',  strokeWeight: 2
                }
            });
            pois.forEach(poi => new google.maps.Marker({ position: poi, map, title: poi.name }));
            updateMap();
        }

        function updateMap() {
            if (!userMarker || !map) return;
            userMarker.setPosition(userPosition);
            map.setCenter(userPosition);

            let minDist = Infinity;
            pois.forEach(poi => {
                const d = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(userPosition.lat, userPosition.lng),
                    new google.maps.LatLng(poi.lat, poi.lng)
                );
                if (d < minDist) { minDist = d; closestPoi = poi; }
            });

            document.getElementById('lat').textContent      = userPosition.lat.toFixed(5);
            document.getElementById('lng').textContent      = userPosition.lng.toFixed(5);
            document.getElementById('heading').textContent  = Math.round(heading);
            document.getElementById('distance').textContent = Math.round(minDist);

            const bearing = google.maps.geometry.spherical.computeHeading(
                new google.maps.LatLng(userPosition.lat, userPosition.lng),
                new google.maps.LatLng(closestPoi.lat, closestPoi.lng)
            );
            const dir = Math.round((bearing - heading + 360) % 360 / 45) % 8;
            document.getElementById('arrows').textContent =
                ['↑','↗','→','↘','↓','↙','←','↖'][dir];
        }

        // ── Inicialização ─────────────────────────────────────────
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            initCamera();
            initThreeOverlay();
            initGPS();
            initMap();
            initHandTracking();
        });

        document.getElementById('exit-btn').addEventListener('click', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            location.reload();
        });
    </script>
</body>
</html>
