<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Navegação</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        /* TELA INICIAL */
        #initial-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #start-btn {
            padding: 16px 32px;
            font-size: 20px;
            background: #00E5FF;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: #00D4FF;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        /* AR SCENE */
        a-scene {
            width: 100%;
            height: 100%;
            display: none;
        }

        a-scene.active {
            display: block;
        }

        /* INSTRUÇÃO */
        #instruction {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 60, 0.85);
            border: 2px solid #00E5FF;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            z-index: 50;
            display: none;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        #instruction.active {
            display: block;
        }

        /* BOTÃO PARAR */
        #stop-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 16px;
            background: #FF3366;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
            display: none;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
            transition: all 0.3s ease;
        }

        #stop-btn:hover {
            background: #FF1144;
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.6);
        }

        #stop-btn:active {
            transform: scale(0.98);
        }

        #stop-btn.active {
            display: block;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            #start-btn {
                padding: 14px 28px;
                font-size: 18px;
            }

            #instruction {
                font-size: 13px;
                top: 15px;
                padding: 8px 16px;
            }

            #stop-btn {
                padding: 10px 16px;
                font-size: 14px;
                bottom: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            #start-btn {
                padding: 12px 24px;
                font-size: 16px;
            }

            #instruction {
                font-size: 12px;
                top: 10px;
                padding: 6px 12px;
            }

            #stop-btn {
                padding: 8px 12px;
                font-size: 12px;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- TELA INICIAL -->
    <div id="initial-screen">
        <button id="start-btn">▶️ Iniciar AR</button>
    </div>

    <!-- INSTRUÇÃO -->
    <div id="instruction">
        ⬆️ Vire um pouco a direita
    </div>

    <!-- BOTÃO PARAR -->
    <button id="stop-btn">⏹️ Parar AR</button>

    <!-- AR SCENE -->
    <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
        <a-camera position="0 0 0"></a-camera>

        <!-- SETA CYAN -->
        <a-entity position="0 0 -2" id="arrow">
            <!-- Cone (Ponta) -->
            <a-cone 
                radius-bottom="0.3" 
                radius-top="0" 
                height="0.6" 
                position="0 0.4 0" 
                color="#00E5FF"
                material="emissive: #00E5FF; emissiveIntensity: 0.8;">
            </a-cone>

            <!-- Cylinder (Haste) -->
            <a-cylinder 
                radius="0.1" 
                height="1.2" 
                position="0 -0.2 0" 
                color="#00E5FF"
                material="emissive: #00E5FF; emissiveIntensity: 0.6;">
            </a-cylinder>

            <!-- Animação de rotação -->
            <a-animation 
                attribute="rotation" 
                from="0 0 0" 
                to="0 360 0" 
                dur="3000" 
                repeat="indefinite">
            </a-animation>
        </a-entity>
    </a-scene>

    <script>
        const initialScreen = document.getElementById('initial-screen');
        const arScene = document.getElementById('ar-scene');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const instruction = document.getElementById('instruction');

        // Iniciar AR
        startBtn.addEventListener('click', () => {
            console.log('▶️ AR iniciado');
            initialScreen.style.display = 'none';
            arScene.classList.add('active');
            instruction.classList.add('active');
            stopBtn.classList.add('active');
        });

        // Parar AR
        stopBtn.addEventListener('click', () => {
            console.log('⏹️ AR parado');
            arScene.classList.remove('active');
            instruction.classList.remove('active');
            stopBtn.classList.remove('active');
            initialScreen.style.display = 'flex';
        });
    </script>
</body>
</html>
