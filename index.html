<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js Maps Tour</title>
    <!-- Link to CSS files -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="responsive.css">
    <!-- AR.js library via CDN -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Three.js dependency for AR.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Main container for AR experience -->
    <div id="ar-container">
        <!-- AR camera element -->
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
            <a-camera gps-camera rotation-reader></a-camera>
            <!-- Placeholder for AR markers or GPS-based POIs -->
            <a-entity id="poi-container"></a-entity>
        </a-scene>
    </div>
    
    <!-- UI elements for displaying POI information -->
    <div id="poi-info" class="hidden">
        <h2 id="poi-name">POI Name</h2>
        <p id="poi-description">POI Description</p>
    </div>
    
    <!-- Controls for the AR experience -->
    <div id="controls">
        <button id="start-btn">Start Tour</button>
        <button id="stop-btn" class="hidden">Stop Tour</button>
    </div>
    
    <!-- Link to JavaScript files -->
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
