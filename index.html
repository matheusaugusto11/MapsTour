<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maps Tour - Experiência de Realidade Aumentada baseada em Mapas">
    <title>Maps Tour - AR Experience</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/components.css">
    <link rel="stylesheet" href="src/css/responsive.css">

    <!-- A-Frame 1.4.2 (versão que funcionava originalmente) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- AR.js master (versão que funcionava originalmente) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active" data-screen="home">
        <div class="home-container">
            <div class="home-content">
                <h1 class="home-title">Maps Tour</h1>
                <p class="home-description">Explore pontos de interesse em realidade aumentada. Descubra locais históricos e culturais através de uma experiência imersiva e interativa.</p>
                <button id="start-experience" class="btn btn-primary btn-large">
                    <span>Iniciar Tour AR</span>
                </button>
            </div>
        </div>
    </div>

    <!-- AR Screen -->
    <div id="ar-screen" class="screen" data-screen="ar">
        <button id="exit-ar" class="btn btn-secondary btn-exit" aria-label="Sair da experiência AR">
            <span>✕ Sair</span>
        </button>
        <a-scene embedded arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;">
            <a-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <!-- Scripts -->
    <script src="src/js/data.js"></script>
    <script src="src/js/main.js"></script>
    
    <!-- Debug -->
    <script>
        console.log('✅ index.html carregou com sucesso!');
        console.log('📍 Versões: A-Frame 1.4.2 + AR.js master');
    </script>
</body>
</html>
