<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR GPS Navigation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-gps-camera@0.1.0/dist/aframe-gps-camera.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #status-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
        #arrow-interface {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        #map {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 5;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 10;
        }
        #camera-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #00E5FF;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #status-panel {
                font-size: 12px;
                padding: 5px;
            }
            #controls {
                bottom: 5px;
                right: 5px;
            }
        }
        @media (max-width: 480px) {
            #map {
                height: 50%;
            }
        }
    </style>
</head>
<body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-camera gps-camera="simulateLatitude: 0; simulateLongitude: 0;" rotation-reader></a-camera>
        <a-entity gps-entity-place="latitude: 0.000045; longitude: 0;" look-at="[gps-camera]">
            <a-box color="red" scale="1 1 1"></a-box>
        </a-entity>
        <a-entity line="start: 0 0 0; end: 0 0 -5; color: yellow;"></a-entity>
        <a-entity id="arrow" geometry="primitive: cone; radiusBottom: 0.1; radiusTop: 0.01; height: 0.2" material="color: #00E5FF" position="0 0 -1" animation="property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear"></a-entity>
    </a-scene>
    <canvas id="camera-canvas"></canvas>
    <div id="status-panel">Status: Initializing...</div>
    <div id="arrow-interface">
        <div id="direction-arrow" style="font-size: 50px; color: #00E5FF;">↑</div>
    </div>
    <iframe id="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.835434509374!2d-122.419415484681!3d37.774929779759!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80858064c6b7b9d7%3A0x7b8b8b8b8b8b8b8b!2sSan%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1633024000000!5m2!1sen!2sus" allowfullscreen="" loading="lazy"></iframe>
    <div id="controls">
        <button id="start-ar">Start AR</button>
        <button id="instruction">Instruction</button>
    </div>
    <script>
        const canvas = document.getElementById('camera-canvas');
        const ctx = canvas.getContext('2d');
        const statusPanel = document.getElementById('status-panel');
        const directionArrow = document.getElementById('direction-arrow');
        let cameraStream;
        let currentHeading = 0;
        let targetHeading = 0;
        const destinationLat = 0.000045; // 5m north
        const destinationLng = 0;
        let currentLat = 0;
        let currentLng = 0;

        // Get user media for camera
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            cameraStream = stream;
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                draw();
            };
        }).catch(err => console.error('Error accessing camera:', err));

        // Draw camera feed and arrows
        function draw() {
            const video = document.querySelector('video');
            if (video) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                // Draw compass arrows
                drawCompassArrows();
            }
            requestAnimationFrame(draw);
        }

        function drawCompassArrows() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const arrowLength = 50;
            ctx.strokeStyle = '#00E5FF';
            ctx.lineWidth = 3;
            // North
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX, centerY - arrowLength);
            ctx.stroke();
            // South
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX, centerY + arrowLength);
            ctx.stroke();
            // East
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + arrowLength, centerY);
            ctx.stroke();
            // West
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX - arrowLength, centerY);
            ctx.stroke();
            // Direction to destination
            const bearing = calculateBearing(currentLat, currentLng, destinationLat, destinationLng);
            targetHeading = bearing - currentHeading;
            // Smooth interpolation
            currentHeading += (targetHeading - currentHeading) * 0.1;
            const angle = (currentHeading * Math.PI) / 180;
            const destX = centerX + Math.sin(angle) * arrowLength;
            const destY = centerY - Math.cos(angle) * arrowLength;
            ctx.strokeStyle = '#00E5FF';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(destX, destY);
            ctx.stroke();
        }

        function calculateBearing(lat1, lng1, lat2, lng2) {
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLng) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        // GPS and heading updates (simplified)
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                currentLat = position.coords.latitude;
                currentLng = position.coords.longitude;
                statusPanel.textContent = `Lat: ${currentLat.toFixed(6)}, Lng: ${currentLng.toFixed(6)}`;
            });
        }

        // Device orientation for heading
        window.addEventListener('deviceorientation', event => {
            if (event.alpha !== null) {
                currentHeading = event.alpha;
            }
        });

        // AR hit test for visual localization
        const scene = document.querySelector('a-scene');
        scene.addEventListener('ar-hit-test', event => {
            // Handle hit test results for localization
            console.log('AR Hit Test:', event.detail);
        });

        // Button events
        document.getElementById('start-ar').addEventListener('click', () => {
            // Start AR session
            scene.enterVR();
        });
        document.getElementById('instruction').addEventListener('click', () => {
            alert('Instructions: Point your camera towards the destination. The arrows will guide you.');
        });
    </script>
</body>
</html>
