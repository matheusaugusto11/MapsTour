<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps Tour</title>
    <link rel="stylesheet" href="src\css\style.css">
    <!-- Include A-Frame and AR.js for AR functionality -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <!-- Home Screen Container -->
    <div id="home-screen">
        <h1>Maps Tour</h1>
        <p>Descrição da experiência de realidade aumentada baseada em mapas.</p>
        <button id="start-experience">Iniciar Experiência</button>
    </div>
    
    <!-- AR Screen Container -->
    <div id="ar-screen" style="display: none;">
        <button id="exit-ar" style="position: absolute; top: 10px; right: 10px; z-index: 1000;">Sair</button>
        <a-scene gps-camera>
            <!-- AR content can be added here -->
        </a-scene>
    </div>
    
    <script src="src\js\data.js"></script>
    <script src="src\js\main.js"></script>
</body>
</html>
